<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界风景图鉴 · 环球摄影集</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="logo">
            <span class="logo-icon">📷</span>
            <h1>世界风景图鉴</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#hero">首页</a></li>
                <li><a href="#cards">图鉴</a></li>
                <li><a href="#about">关于</a></li>
            </ul>
        </nav>
    </header>

    <section id="hero" class="hero">
        <div class="hero-content">
            <h2>探索世界之美</h2>
            <p>用镜头记录世界，用心感受自然</p>
        </div>
    </section>

    <section id="cards" class="main-content">
        <div class="sidebar">
            <div class="api-card">
                <h3>今日寄语</h3>
                <div id="hitokoto" class="hitokoto">光影凝聚中...</div>
                <div class="hitokoto-author"></div>
            </div>
            <div class="api-card">
                <h3>精选图片</h3>
                <div class="random-image-container">
                    <img id="random-image" src="https://picsum.photos/300/200?random=1" alt="风景">
                </div>
            </div>
        </div>

        <div class="content-area">
            <div class="search-filter">
                <div class="search-box-wrapper">
                    <input type="text" id="search-input" placeholder="搜索地区、风景类型..." class="search-box">
                    <button id="search-btn" class="search-btn">🔍</button>
                </div>
                <div class="filter-tags">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="自然">自然</button>
                    <button class="filter-btn" data-filter="城市">城市</button>
                    <button class="filter-btn" data-filter="建筑">建筑</button>
                    <button class="filter-btn" data-filter="人文">人文</button>
                </div>
                <div class="sort-options">
                    <button id="sort-desc" class="sort-btn active">点赞 ↓</button>
                    <button id="sort-asc" class="sort-btn">点赞 ↑</button>
                </div>
            </div>

            <div id="cards-container" class="cards-container">
                <div id="empty-state" class="empty-state" style="display: none;">
                    <span class="empty-icon">📷</span>
                    <p>暂无匹配的风景</p>
                </div>
            </div>
        </div>
    </section>

    <section id="about" class="about">
        <h2>关于世界风景图鉴</h2>
        <p>世界风景图鉴，收录全球各地的绝美风景与摄影作品。</p>
        <p>无论是壮阔的自然风光，还是独特的人文景观，都值得被记录与分享。</p>
    </section>

    <footer>
        <p>© 世界风景图鉴 · 环球摄影集</p>
    </footer>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="modal-close">✕</span>
            <div class="modal-body">
                <img id="modal-image" src="" alt="">
                <h3 id="modal-title"></h3>
                <p id="modal-description"></p>
                <div class="modal-stats">
                    <span class="stat-item">分类：<span id="modal-category"></span></span>
                    <span class="stat-item">点赞：<span id="modal-likes"></span></span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
